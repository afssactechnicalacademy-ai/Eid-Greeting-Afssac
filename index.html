<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطاقة تهنئة أكاديمية العرب</title>
    <style>
        @font-face {
            font-family: "TheSansArab";
            src: url('https://db.onlinewebfonts.com/t/215106c107ed3f7d88566a7b065a0fa0.woff2') format('woff2');
            font-weight: 900;
        }
        body { font-family: 'Arial', sans-serif; background: #f0f0f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .setup-box { background: white; padding: 30px; border-radius: 15px; text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.2); width: 350px; }
        input { width: 100%; padding: 12px; margin: 20px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 18px; text-align: center; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-create { background: #1a5e3a; color: white; }
        .btn-download { background: #d1202f; color: white; margin-top: 15px; }
        #display-section { display: none; }
        canvas { width: 100%; border-radius: 10px; }
    </style>
</head>
<body>

<div class="setup-box" id="input-section">
    <h3 style="margin-top:0">أدخل اسم المهنئ</h3>
    <input type="text" id="userName" placeholder="اكتب الاسم هنا..." maxlength="40">
    <button class="btn-create" onclick="processImage()">إنشاء البطاقة</button>
</div>

<div class="setup-box" id="display-section">
    <canvas id="mainCanvas"></canvas>
    <button class="btn-download" onclick="saveImage()">تحميل الصورة</button>
    <button style="background:#666; color:white; margin-top:10px" onclick="location.reload()">تعديل الاسم</button>
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const background = new Image();
    background.src = 'Card.jpg'; 

    function processImage() {
        const name = document.getElementById('userName').value.trim();
        if (!name) return alert("من فضلك اكتب الاسم");

        canvas.width = 1080;
        canvas.height = 1920;

        if (background.complete) { render(name); } 
        else { background.onload = () => render(name); }
    }

    function render(name) {
        ctx.drawImage(background, 0, 0, canvas.width, canvas.height);
        
        // إعدادات الخط الأسود العريض
        ctx.fillStyle = "#000000";
        ctx.textAlign = "center";
        ctx.font = "900 65px 'TheSansArab', sans-serif";

        // الضبط القاتل للمكان:
        // الإحداثي 1380 هو الفراغ الأبيض "الآمن" تحت كلمة Eid Mubarak
        // كده الاسم مش هيلمس الزخرفة السوداء اللي على اليمين ولا التاريخ اللي تحت
        ctx.fillText(name, 720, 1380); 

        document.getElementById('input-section').style.display = 'none';
        document.getElementById('display-section').style.display = 'block';
    }

    function saveImage() {
        const link = document.createElement('a');
        link.download = 'Eid_Greeting.png';
        link.href = canvas.toDataURL("image/png");
        link.click();
    }
</script>
</body>
</html>
