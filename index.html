<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تهنئة عيد الفطر - أكاديمية العرب</title>
    <style>
        /* تعريف خط Questv1 ليتناسب مع "عيد مبارك" */
        @font-face {
            font-family: 'Questv1';
            src: url('https://db.onlinewebfonts.com/t/79495b5c777d449f874f664a34b22301.woff2') format('woff2');
            font-weight: normal;
        }

        body { font-family: 'Arial', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 380px; }
        .logo { width: 100px; margin-bottom: 20px; }
        input { font-family: 'Questv1', sans-serif; width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; font-size: 18px; text-align: center; margin-bottom: 20px; outline: none; }
        .btn { font-family: 'Questv1', sans-serif; border: none; padding: 15px; border-radius: 12px; font-size: 18px; cursor: pointer; width: 100%; font-weight: bold; }
        .btn-green { background: #1a5e3a; color: white; }
        .btn-red { background: #d1202f; color: white; margin-top: 15px; }
        .btn-gray { background: #666; color: white; margin-top: 10px; }
        
        #step2 { display: none; }
        canvas { width: 100%; border-radius: 15px; background: #eee; }
    </style>
</head>
<body>

<div class="box" id="step1">
    <img src="logo.png" class="logo" onerror="this.style.display='none'">
    <h2 style="color:#1a5e3a; font-family: 'Questv1', sans-serif;">إنشاء بطاقة المعايدة</h2>
    <input type="text" id="nameInput" placeholder="اكتب الاسم هنا..." maxlength="40">
    <button class="btn btn-green" onclick="generateCard()">إنشاء البطاقة الآن</button>
</div>

<div class="box" id="step2">
    <canvas id="cardCanvas"></canvas>
    <button class="btn btn-red" onclick="downloadImage()">تحميل الصورة</button>
    <button class="btn btn-gray" onclick="location.reload()">تعديل الاسم</button>
</div>

<script>
    const canvas = document.getElementById('cardCanvas');
    const ctx = canvas.getContext('2d');
    const cardImg = new Image();
    
    // تأكد أن اسم ملف الصورة الأصلية في GitHub هو Card.jpg (C كبيرة)
    cardImg.src = 'Card.jpg'; 

    function generateCard() {
        const name = document.getElementById('nameInput').value.trim();
        if (!name) return alert("من فضلك اكتب الاسم أولاً");

        canvas.width = 1080;
        canvas.height = 1920;

        if (cardImg.complete) {
            ctx.drawImage(cardImg, 0, 0, canvas.width, canvas.height);
            drawText(name);
        } else {
            cardImg.onload = function() {
                ctx.drawImage(cardImg, 0, 0, canvas.width, canvas.height);
                drawText(name);
            };
        }

        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
    }

    function drawText(name) {
        // --- تطبيق التعديلات الجوهرية ---
        
        // 1. اللون: تغيير من البني الداكن إلى الأسود الصريح
        ctx.fillStyle = "#000000"; 
        ctx.textAlign = "center";
        
        // 2. نوع الخط والوزن: الحفاظ على Questv1-Regular
        ctx.font = "normal 90px 'Questv1', sans-serif"; 
        
        // 3. المكان (1700): إنزال الاسم ليكون في أسفل البطاقة تماماً فوق التاريخ
        ctx.fillText(name, canvas.width / 2, 1700);
    }

    function downloadImage() {
        const link = document.createElement('a');
        link.download = 'Eid_Greeting_AFSSAC.png';
        link.href = canvas.toDataURL("image/png");
        link.click();
    }
</script>

</body>
</html>
