<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تهنئة أكاديمية العرب</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Arial', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        input { width: 100%; padding: 12px; margin: 20px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 18px; text-align: center; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-generate { background: #1a5e3a; color: white; }
        .btn-download { background: #d1202f; color: white; margin-top: 15px; }
        #result-section { display: none; }
        canvas { width: 100%; border-radius: 10px; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container" id="input-section">
    <h2 style="color:#1a5e3a">بطاقة تهنئة العيد</h2>
    <input type="text" id="nameInput" placeholder="أدخل الاسم هنا..." maxlength="40">
    <button class="btn-generate" onclick="startDrawing()">إنشاء البطاقة الآن</button>
</div>

<div class="container" id="result-section">
    <canvas id="cardCanvas"></canvas>
    <button class="btn-download" onclick="downloadImage()">تحميل البطاقة</button>
    <button style="background:#888; color:white; margin-top:10px" onclick="location.reload()">تغيير الاسم</button>
</div>

<script>
    const canvas = document.getElementById('cardCanvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    
    // تأكد أن اسم ملف الصورة في GitHub هو Card.jpg
    img.src = 'Card.jpg'; 

    function startDrawing() {
        const name = document.getElementById('nameInput').value.trim();
        if (!name) return alert("من فضلك اكتب الاسم");

        canvas.width = 1080;
        canvas.height = 1920;

        if (img.complete) {
            render(name);
        } else {
            img.onload = () => render(name);
        }
    }

    function render(name) {
        // 1. رسم الخلفية الأصلية كاملة (الشعار والكلام)
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        // 2. إعدادات الخط (لون أسود ووزن عريض)
        ctx.fillStyle = "#000000";
        ctx.textAlign = "center";
        ctx.font = "800 85px 'Noto Sans Arabic', sans-serif";

        // 3. الموقع الجديد (1550) لينزل الاسم تحت كلمة "كل عام وأنتم بخير"
        ctx.fillText(name, 540, 1550);

        document.getElementById('input-section').style.display = 'none';
        document.getElementById('result-section').style.display = 'block';
    }

    function downloadImage() {
        const link = document.createElement('a');
        link.download = 'AFSSAC_Eid.png';
        link.href = canvas.toDataURL("image/png");
        link.click();
    }
</script>

</body>
</html>
